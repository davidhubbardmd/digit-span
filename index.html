<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multi-modality Digit Span Test - Dr. Hubbard</title>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Arial', sans-serif; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; }
        #digit-display { font-size: 800px; line-height: 1; font-weight: 900; }
        #status-box { position: absolute; top: 30px; left: 30px; padding: 20px; border: 2px solid #333; font-size: 18px; width: 420px; text-transform: uppercase; }
        .listening { border-color: #00ff00 !important; color: #00ff00; box-shadow: 0 0 15px #00ff00; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; cursor: pointer; text-align: center; }
        #download-btn { display: none; margin-top: 20px; padding: 20px 40px; font-size: 24px; cursor: pointer; background: #0044cc; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="overlay" onclick="requestMicAndStart()">
        <h1 style="font-size: 50px; margin-bottom: 10px;">Multi-modality Digit Span Test</h1>
        <h2 style="font-size: 30px; color: #00ccff;">David Hubbard MD, Neurology</h2>
        <p style="font-size: 20px; color: #888; margin-top: 20px;">CLICK TO AUTHORIZE MICROPHONE & BEGIN</p>
    </div>

    <div id="status-box">SYSTEM READY</div>
    <div id="digit-display"></div>
    <button id="download-btn" onclick="downloadCSV()">DOWNLOAD CLINICAL REPORT (CSV)</button>

<script>
const CONFIG = { START_SPAN: 3, MAX_SPAN: 9, DISPLAY_MS: 2000, INTER_DIGIT_MS: 500, POST_RESPONSE_DELAY: 1500 };
let patientInfo = { firstName: "", date: new Date().toLocaleDateString(), testNo: "1" };
let currentSpan = CONFIG.START_SPAN;
let isForward = true;
let sequence = [];
let resultsLog = [];
let recognition;
let synth = window.speechSynthesis;

function speak(text, callback) {
    synth.cancel(); // Stop any current talking
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.rate = 0.9;
    utterance.onend = callback;
    synth.speak(utterance);
}

function requestMicAndStart() {
    const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new Speech();
    recognition.lang = 'en-US';
    recognition.start();
    recognition.onstart = () => {
        recognition.stop();
        document.getElementById('overlay').style.display = 'none';
        calibrateMic();
    };
}

function calibrateMic() {
    speak("Please state the patient's first name.", () => {
        captureVoice((name) => {
            if (!name) { speak("I didn't hear a name. Try again.", calibrateMic); }
            else {
                patientInfo.firstName = name;
                speak("I heard " + name + ". The test will now begin. Watch for numbers.", () => {
                    setTimeout(runTrial, 1000);
                });
            }
        });
    });
}

function captureVoice(callback) {
    updateStatus("LISTENING...", "listening");
    recognition.onresult = (event) => {
        recognition.stop();
        callback(event.results[0][0].transcript);
    };
    recognition.onerror = () => { recognition.stop(); callback(null); };
    recognition.start();
}

async function runTrial() {
    sequence = Array.from({length: currentSpan}, () => Math.floor(Math.random() * 10));
    updateStatus(`DISPLAYING ${currentSpan} DIGITS`, "");
    await sleep(1500);

    for (let digit of sequence) {
        document.getElementById('digit-display').innerText = digit;
        await sleep(CONFIG.DISPLAY_MS);
        document.getElementById('digit-display').innerText = "";
        await sleep(CONFIG.INTER_DIGIT_MS);
    }
    promptResponse();
}

function promptResponse() {
    updateStatus("LISTENING FOR RESPONSE...", "listening");
    recognition.onresult = (event) => {
        recognition.stop();
        const result = event.results[0][0].transcript.replace(/\D/g, '');
        processInput(result);
    };
    recognition.start();
}

function processInput(input) {
    const target = isForward ? sequence.join('') : [...sequence].reverse().join('');
    const isCorrect = input === target;
    resultsLog.push({ Mode: isForward ? "Forward" : "Backward", Span: currentSpan, Target: target, Response: input || "None", Result: isCorrect ? "PASS" : "FAIL" });
    updateStatus(isCorrect ? "CORRECT" : "INCORRECT", isCorrect ? "" : "error");
    
    setTimeout(() => {
        if (isCorrect && currentSpan < CONFIG.MAX_SPAN) {
            currentSpan++;
            runTrial();
        } else if (isForward) {
            isForward = false;
            currentSpan = CONFIG.START_SPAN;
            speak("Now, repeat the numbers in backward order.", runTrial);
        } else {
            finish();
        }
    }, CONFIG.POST_RESPONSE_DELAY);
}

function finish() {
    document.getElementById('digit-display').style.fontSize = "80px";
    document.getElementById('digit-display').innerText = "TEST COMPLETE";
    document.getElementById('download-btn').style.display = 'inline-block';
    speak("Test complete. Download the report.");
}

function downloadCSV() {
    let csv = `Patient,${patientInfo.firstName}\nDate,${patientInfo.date}\n\nMode,Span,Target,Response,Result\n`;
    resultsLog.forEach(row => { csv += `${row.Mode},${row.Span},${row.Target},${row.Response},${row.Result}\n`; });
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `DigitSpan_${patientInfo.firstName}.csv`;
    a.click();
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function updateStatus(text, className) {
    const box = document.getElementById('status-box');
    box.innerText = text;
    box.className = className;
}
</script>
</body>
</html>
